<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Custom Css -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="d-flex align-items-center justify-content-between">
          <div>
            <h1><i class="bi bi-book me-2"></i>Phonebook</h1>
            <p>// your contacts, neatly stored</p>
          </div>
        </div>
      </div>
    </header>

    <main class="container py-4">
      <div class="row g-2 align-items-center mb-4">
        <div class="col">
          <div class="search-wrap">
            <i class="bi bi-search"></i>
            <input
              type="search"
              class="search-bar"
              id="searchInput"
              placeholder="Search by name or number…"
              aria-label="Search contacts"
            />
          </div>
        </div>
        <div class="col-auto">
          <button
            class="btn-add"
            id="openAddModal"
            aria-label="Add new contact"
          >
            <i class="bi bi-plus-lg"></i> Add Contact
          </button>
        </div>
      </div>

      <p class="count-label mb-3" id="countLabel">Loading…</p>

      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
      </div>

      <!-- //propogated using javascript -->
      <ul id="contactList" class="contact-list" aria-label="Contact list"></ul>

      <div id="emptyState" class="empty-state" role="status">
        <i class="bi bi-person-x"></i>
        <p id="emptyMsg">No contacts yet. Add your first one!</p>
      </div>
    </main>

    <!-- Add and Edit Modal -->
    <div
      class="modal fade form-modal"
      id="formModal"
      tabindex="-1"
      aria-labelledby="formModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="formModalLabel">Add Contact</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="inputName">FULL NAME</label>
              <input
                type="text"
                id="inputName"
                class="form-control"
                placeholder="e.g. Alice Johnson"
                maxlength="60"
              />
              <p class="field-error" id="nameError">
                Name must be at least 2 letters (no numbers or special
                characters).
              </p>
            </div>
            <div class="mb-1">
              <label for="inputPhone">PHONE NUMBER</label>
              <input
                type="tel"
                id="inputPhone"
                class="form-control"
                placeholder="e.g. +1-555-123-4567"
                maxlength="20"
              />
              <p class="field-error" id="phoneError">
                Please enter a valid phone number.
              </p>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-cancel" data-bs-dismiss="modal">
              Cancel
            </button>
            <button type="button" class="btn-save" id="saveBtn">
              Save Contact
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Delete Modal -->
    <div
      class="modal fade delete-modal"
      id="deleteModal"
      tabindex="-1"
      aria-labelledby="deleteModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
          <div class="modal-body">
            <i class="bi bi-exclamation-triangle"></i>
            <p class="mt-2">
              Delete <strong id="deleteContactName"></strong>?<br />This cannot
              be undone.
            </p>
          </div>
          <div class="modal-footer justify-content-center">
            <button type="button" class="btn-cancel" data-bs-dismiss="modal">
              Cancel
            </button>
            <button
              type="button"
              class="btn-danger-confirm"
              id="confirmDeleteBtn"
            >
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="alert" aria-live="polite"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Js -->
    <script src="./js/script.js"></script>
  </body>
</html>
